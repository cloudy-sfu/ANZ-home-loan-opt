name: Collect mortgage interest rates

on:
  schedule:
    - cron: '0 5 * * 5'  # Friday 5:00 UTC
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      NEON_DB: ${{ secrets.NEON_DB }}
      PYTHONPATH: . 

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run the script
        run: |
          python get_data/ocr.py
          python get_data/avg_mortgage_rate.py
          python get_data/wholesale_swap_rate.py
          python get_data/ins_mortgage_rate.py
