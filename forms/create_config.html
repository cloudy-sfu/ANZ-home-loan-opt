<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mortgage Repayment Optimizer Configuration</title>
        <link rel="stylesheet" type="text/css" href="./style.css" />
    </head>
    <body>
        <div class="form-area">
            <!-- ── page head (static, no form data) ── -->
            <div class="page-head">
                <h1>Mortgage Repayment Optimizer Configuration</h1>
                <p>Fields marked <span class="req">*</span> are required.</p>
                <div style="margin-top: 0.8rem">
                    <input
                        type="file"
                        id="importFile"
                        accept=".json"
                        style="display: none"
                        onchange="importJSON(this)"
                    />
                    <button
                        type="button"
                        class="btn btn-secondary"
                        onclick="document.getElementById('importFile').click()"
                    >
                        Import Config
                    </button>
                </div>
            </div>

            <div id="valMsg" class="val-msg"></div>

            <!-- form is kept as a shell; sections are injected by JS -->
            <form id="mortgageForm" novalidate></form>
        </div>

        <script>
            let subloanIdx = 0;
            let salaryIdx = 0;
            let oneoffIdx = 0;

            // ── Unit-conversion helpers ───────────────────────────────
            const FORTNIGHTS_PER_YEAR = 26;
            const MONTHS_PER_YEAR = 12;

            const monthlyToFortnightly = (v) => v === null ? null : v * MONTHS_PER_YEAR / FORTNIGHTS_PER_YEAR;
            const fortnightlyToMonthly = (v) => v === null ? null : v * FORTNIGHTS_PER_YEAR / MONTHS_PER_YEAR;

            const weeklyToFortnightly = (v) => v === null ? null : v * 2;
            const fortnightlyToWeekly = (v) => v === null ? null : v / 2;

            const annuallyToFortnightly = (v) => v === null ? null : v / FORTNIGHTS_PER_YEAR;

            const monthsToFortnights = (m) => m === null ? null : Math.round(m * FORTNIGHTS_PER_YEAR / MONTHS_PER_YEAR);
            const fortnightsToMonths = (f) => f === null ? null : Math.round(f * MONTHS_PER_YEAR / FORTNIGHTS_PER_YEAR);

            const yearsToFortnights = (y) => y === null ? null : Math.round(y * FORTNIGHTS_PER_YEAR);
            const fortnightsToYears = (f) => f === null ? null : f / FORTNIGHTS_PER_YEAR;

            function freqToFortnightly(val, freq) {
                if (val === null) return null;
                if (freq === "weekly") return weeklyToFortnightly(val);
                if (freq === "monthly") return monthlyToFortnightly(val);
                if (freq === "annually") return annuallyToFortnightly(val);
                return val; // fortnightly
            }

            function fortnightlyToFreq(val, freq) {
                if (val === null) return null;
                if (freq === "weekly") return fortnightlyToWeekly(val);
                if (freq === "monthly") return fortnightlyToMonthly(val);
                if (freq === "annually") return val * FORTNIGHTS_PER_YEAR;
                return val; // fortnightly
            }

            const FIXED_TERM_OPTIONS = [
                { label: "Floating", value: 0 },
                { label: "6 months", value: 13 },
                { label: "1 year", value: 26 },
                { label: "18 months", value: 39 },
                { label: "2 years", value: 52 },
                { label: "3 years", value: 78 },
                { label: "4 years", value: 104 },
                { label: "5 years", value: 130 },
            ];

            // ── DOM helpers ───────────────────────────────────────────
            function el(tag, attrs = {}, ...children) {
                const node = document.createElement(tag);
                for (const [k, v] of Object.entries(attrs)) {
                    if (v === null || v === undefined) continue;
                    if (k === "class") node.className = v;
                    else if (k.startsWith("on")) node.addEventListener(k.slice(2).toLowerCase(), v);
                    else if (k === "style" && typeof v === "object") Object.assign(node.style, v);
                    else node.setAttribute(k, v);
                }
                for (const c of children) {
                    if (c === null || c === undefined) continue;
                    node.append(typeof c === "string" ? c : c);
                }
                return node;
            }

            function fieldGroup(labelText, inputNode, hint, required = true) {
                return el(
                    "div",
                    { class: "field" },
                    el(
                        "label",
                        {},
                        labelText + " ",
                        required ? el("span", { class: "req" }, "*") : null
                    ),
                    inputNode,
                    hint ? el("div", { class: "hint" }, hint) : null
                );
            }

            function fieldGroupHTML(labelText, inputNode, hintHTML, required = true) {
                const f = el(
                    "div",
                    { class: "field" },
                    el(
                        "label",
                        {},
                        labelText + " ",
                        required ? el("span", { class: "req" }, "*") : null
                    ),
                    inputNode
                );
                if (hintHTML) {
                    const d = el("div", { class: "hint" });
                    d.innerHTML = hintHTML;
                    f.append(d);
                }
                return f;
            }

            function sectionDesc(text) {
                return el("p", { style: { fontSize: "1rem", color: "#64748b", marginBottom: "0.6rem" } }, text);
            }

            function toNumberOrNull(value) {
                if (value === "" || value === null || value === undefined) return null;
                const n = Number(value);
                return Number.isFinite(n) ? n : null;
            }

            function toIntOrNull(value) {
                const n = toNumberOrNull(value);
                return n !== null && Number.isInteger(n) ? n : null;
            }

            function strOrNull(id) {
                const v = document.getElementById(id).value;
                return v === "" ? null : v;
            }

            function isValidISODate(v) {
                return typeof v === "string" && /^\d{4}-\d{2}-\d{2}$/.test(v) && !isNaN(Date.parse(v));
            }

            // ── Section builders ──────────────────────────────────────

            function buildRevenueSection() {
                const sec = el(
                    "div",
                    { class: "section" },
                    el("h2", {}, "1. Revenue"),
                    sectionDesc("Your starting financial position and the cash flow that funds repayments.")
                );

                const s0Input = el("input", { type: "number", id: "s0", step: "0.01", required: "required", style: { width: "60%" } });
                const s0Freq = el(
                    "select",
                    { id: "s0Freq", style: { width: "40%" } },
                    el("option", { value: "weekly" }, "Weekly"),
                    el("option", { value: "fortnightly" }, "Fortnightly"),
                    el("option", { value: "monthly", selected: "selected" }, "Monthly")
                );

                sec.append(
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup(
                            "First Repayment Date",
                            el("input", { type: "date", id: "d0", required: "required" }),
                            "The reference date of any past or future repayment. Sets the bi-weekly repayment cycle."
                        ),
                        fieldGroup(
                            "Total Loan Amount (NZD)",
                            el("input", { type: "text", id: "totalLoanDisplay", readonly: "readonly", style: { background: "#f1f5f9" }, required: "required" }),
                            'Auto-calculated from the loan parts in "Loan Structure" section.'
                        ),
                        fieldGroup(
                            "Prediction Start Date",
                            el("input", { type: "date", id: "startDate", required: "required" }),
                            "The calendar date when the optimisation begins."
                        ),
                        fieldGroupHTML(
                            "Equity > 20%",
                            el(
                                "select",
                                { id: "lvr", required: "required" },
                                el("option", { value: "true" }, "Yes"),
                                el("option", { value: "false", selected: "selected" }, "No")
                            ),
                            '<a href="https://www.anz.co.nz/personal/home-loans-mortgages/loan-types/fixed/" target="_blank">Special interest rate</a> applies to loan which has minimum 20% equity and salary direct credited.'
                        ),
                        fieldGroup(
                            "Disposable Balance (NZD)",
                            el("input", { type: "number", id: "c0", min: "0", step: "0.01", value: "0", required: "required" }),
                            "Account bank balance that can be used to repay home loan. Do not include cashback in this amount."
                        ),
                        fieldGroup(
                            "Disposable Income (NZD)",
                            el("div", { style: { display: "flex", gap: "0.5rem" } }, s0Input, s0Freq),
                            "Surplus income after tax, necessities, and living expenses. Can be negative if expenses exceed income."
                        )
                    )
                );

                // Advanced
                const advBody = el(
                    "div",
                    { class: "adv-body" },
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup(
                            "Prediction Horizon (Years)",
                            el("input", { type: "number", id: "T_years", min: "1", max: "10", step: "1", value: "5", required: "required" }),
                            "How many years into the future the optimiser evaluates."
                        )
                    ),
                    el("h3", {}, "Future Income Changes"),
                    el("button", { type: "button", class: "btn btn-add", onClick: addSalaryChange }, "+ Add Income Change"),
                    el("div", { class: "list-group", id: "salaryChangesList" }),
                    el("h3", {}, "One-Off Extra Income"),
                    el("p", { style: { fontSize: "1rem", color: "#64748b", marginBottom: "0.4rem" } }, "Lump sums you expect to receive, such as bonuses, tax refunds, or gifts."),
                    el("button", { type: "button", class: "btn btn-add", onClick: addOneOff }, "+ Add One-Off Income"),
                    el("div", { class: "list-group", id: "oneOffList" })
                );

                const details = el("details", { class: "adv" }, el("summary", {}, "Advanced"), advBody);
                sec.append(details);

                return sec;
            }

            function buildLoanStructureSection() {
                return el(
                    "div",
                    { class: "section" },
                    el("h2", {}, "2. Loan Structure"),
                    sectionDesc("Describe each part of your loan. For a simple loan with no splits, one part is enough."),
                    el("button", { type: "button", class: "btn btn-add", id: "btnAddSubloan", onClick: addSubloan }, "+ Add Loan Part"),
                    el("div", { class: "list-group", id: "subloanList" })
                );
            }

            function buildBankPolicySection() {
                const sec = el(
                    "div",
                    { class: "section" },
                    el("h2", {}, "3. Bank Policy"),
                    sectionDesc("Settings that depend on your bank's terms and conditions. Defaults are pre-filled for typical NZ bank policies.")
                );

                const advBody = el(
                    "div",
                    { class: "adv-body" },
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup(
                            "Max Loan Parts",
                            el("input", { type: "number", id: "N", min: "1", max: "20", step: "1", value: "4", required: "required" }),
                            "Maximum number of loan splits your bank allows at the same time."
                        ),
                        fieldGroup(
                            "Restructure Fee (NZD)",
                            el("input", { type: "number", id: "phi", min: "0", step: "0.01", value: "0", required: "required" }),
                            "Flat admin fee charged each time you break or restructure a loan part."
                        ),
                        fieldGroup(
                            "Penalty-Free Lump Sum (%)",
                            el("input", { type: "number", id: "alpha", min: "0", max: "100", step: "0.01", value: "5", required: "required" }),
                            "Each year, you can make extra repayments up to this percentage of the anniversary balance without penalty."
                        ),
                        fieldGroup(
                            "Penalty-Free Payment Increase per Week (NZD)",
                            el("input", { type: "number", id: "beta", min: "0", step: "0.01", value: "250", required: "required" }),
                            "The most you can raise your weekly equivalent payment by each anniversary year. NZ banks commonly cap this at NZD 250 per week."
                        )
                    ),
                    el("h3", {}, "Cashback"),
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup(
                            "Cashback (%)",
                            el("input", { type: "number", id: "gamma", min: "0", max: "100", step: "0.01", value: "0", required: "required" }),
                            "Percentage of your loan the bank pays you as a cash incentive at drawdown."
                        ),
                        fieldGroup(
                            "Clawback Period (years)",
                            el("input", { type: "number", id: "tau", min: "0", step: "1", value: "3", required: "required" }),
                            "If you repay the entire loan within this many years, you must return some or all of the cashback."
                        ),
                        fieldGroup(
                            "Clawback Type",
                            el(
                                "select",
                                { id: "theta", required: "required" },
                                el("option", { value: "0" }, "Full — return all cashback"),
                                el("option", { value: "1" }, "Pro-rata — return remaining fraction")
                            ),
                            "Full: repay entire cashback. Pro-rata: repay only for the unused portion of the clawback period."
                        )
                    )
                );

                sec.append(el("details", { class: "adv" }, el("summary", {}, "Advanced"), advBody));
                return sec;
            }

            function buildSolverSection() {
                const sec = el(
                    "div",
                    { class: "section" },
                    el("h2", {}, "4. Solver Settings"),
                    sectionDesc("Tuning parameters for the optimisation engine. Defaults are pre-filled and work well for most cases.")
                );

                const advBody = el(
                    "div",
                    { class: "adv-body" },
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup(
                            "Bankruptcy Penalty Weight",
                            el("input", { type: "number", id: "Omega", min: "0", step: "1", value: "1000000", required: "required" }),
                            "A very large cost applied when cash runs out. Higher = stronger avoidance."
                        ),
                        fieldGroup(
                            "Interest Decay Factor",
                            el("input", { type: "number", id: "zeta", min: "0.01", max: "0.99", step: "0.01", value: "0.55", required: "required" }),
                            "Approximates how total interest shrinks as principal is repaid over time. Typically 0.55–0.60."
                        )
                    )
                );

                sec.append(el("details", { class: "adv" }, el("summary", {}, "Advanced"), advBody));
                return sec;
            }

            function buildActions() {
                return el(
                    "div",
                    { class: "actions" },
                    el("button", { type: "button", class: "btn btn-secondary", onClick: resetForm }, "Reset"),
                    el("button", { type: "button", class: "btn btn-primary", onClick: exportJSON }, "Export Config")
                );
            }

            // ── Dynamic-list item builders ───────────────────────────

            function createSubloan(i, isFirst) {
                const fSelect = el("select", {});
                FIXED_TERM_OPTIONS.forEach((opt) => {
                    fSelect.append(el("option", { value: String(opt.value) }, opt.label));
                });

                const refs = {
                    b: el("input", { type: "number", min: "0", step: "0.01", required: "required" }),
                    loanStartDate: el("input", { type: "date", required: "required" }),
                    term: el("input", { type: "number", min: "0.01", step: "any", required: "required", style: { width: "60%" } }),
                    termUnit: el(
                        "select",
                        { style: { width: "40%" } },
                        el("option", { value: "year", selected: "selected" }, "Years"),
                        el("option", { value: "month" }, "Months"),
                        el("option", { value: "fortnight" }, "Fortnights")
                    ),
                    p0: el("input", { type: "number", min: "0", step: "0.01", style: { width: "60%" } }),
                    p0Freq: el(
                        "select",
                        { style: { width: "40%" } },
                        el("option", { value: "weekly" }, "Weekly"),
                        el("option", { value: "fortnightly", selected: "selected" }, "Fortnightly"),
                        el("option", { value: "monthly" }, "Monthly")
                    ),
                    contractDate: el("input", { type: "date" }),
                    f: fSelect,
                    AL: el("input", { type: "number", min: "0", step: "0.01", value: "0" }),
                    AP: el(
                        "select",
                        {},
                        el("option", { value: "0" }, "No"),
                        el("option", { value: "1" }, "Yes")
                    ),
                    a: el("input", { type: "number", min: "0", step: "0.01" }),
                };

                refs.b.addEventListener("input", updateTotalLoan);

                const node = el(
                    "div",
                    { class: "list-item", "data-sl": String(i) },
                    el("div", { class: "item-head" }, el("span", {}, "Loan Part")),
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup(
                            "Principal (NZD)",
                            refs.b,
                            "Outstanding balance of this loan part."
                        ),
                        fieldGroup(
                            "Loan Start Date",
                            refs.loanStartDate,
                            "The date when the loan was originally drawn."
                        ),
                        fieldGroup(
                            "Loan Term",
                            el("div", { style: { display: "flex", gap: "0.5rem" } }, refs.term, refs.termUnit),
                            "Total term to fully repay the loan, like 20 years or 30 years."
                        ),
                        fieldGroup(
                            "Current Regular Payment",
                            el("div", { style: { display: "flex", gap: "0.5rem" } }, refs.p0, refs.p0Freq),
                            "Most recent payment. Leave blank to auto-calculate if floating.",
                            false
                        ),
                        fieldGroup(
                            "Interest Rate Type",
                            refs.f,
                            "Interest rate is floating or locked in fixed term."
                        ),
                    ),
                    el("h3", {}, "Fixed term details"),
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup(
                            "Contract Start Date",
                            refs.contractDate,
                            "When you locked in the fixed rate.",
                            false
                        ),
                        fieldGroup(
                            "Extra Repayments Made This Year (NZD)",
                            refs.AL,
                            "Total lump-sum payments already made since the last contract anniversary.",
                            false
                        ),
                        fieldGroup(
                            "Payment Increase Already Used?",
                            refs.AP,
                            "Have you already raised the regular payment during the current anniversary year?",
                            false
                        ),
                        fieldGroup(
                            "Balance at Last Anniversary (NZD)",
                            refs.a,
                            "Leave blank to use current principal.",
                            false
                        )
                    )
                );

                if (!isFirst) {
                    node.querySelector(".item-head").append(
                        el("button", { type: "button", class: "btn btn-del", onClick: () => { node.remove(); updateTotalLoan(); } }, "✕ Remove")
                    );
                }

                node.refs = refs;
                return node;
            }

            function createSalaryChange(i) {
                const refs = {
                    date: el("input", { type: "date", required: "required" }),
                    val: el("input", { type: "number", step: "0.01", required: "required", style: { width: "60%" } }),
                    freq: el(
                        "select",
                        { style: { width: "40%" } },
                        el("option", { value: "weekly" }, "Weekly"),
                        el("option", { value: "fortnightly" }, "Fortnightly"),
                        el("option", { value: "monthly", selected: "selected" }, "Monthly")
                    )
                };

                const node = el(
                    "div",
                    { class: "list-item", "data-sc": String(i) },
                    el("div", { class: "item-head" }, el("span", {}, "Income Change")),
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup("Effective From", refs.date, "Date the new income takes effect."),
                        fieldGroup("New Disposable Income (NZD)", el("div", { style: { display: "flex", gap: "0.5rem" } }, refs.val, refs.freq), "Amount from this point onward.")
                    )
                );

                node.querySelector(".item-head").append(
                    el("button", { type: "button", class: "btn btn-del", onClick: () => node.remove() }, "✕ Remove")
                );
                node.refs = refs;
                return node;
            }

            function createOneOff(i) {
                const refs = {
                    date: el("input", { type: "date", required: "required" }),
                    val: el("input", { type: "number", min: "0", step: "0.01", required: "required" }),
                };

                const node = el(
                    "div",
                    { class: "list-item", "data-oo": String(i) },
                    el("div", { class: "item-head" }, el("span", {}, "One-Off Income Event")),
                    el(
                        "div",
                        { class: "row" },
                        fieldGroup("Date Received", refs.date, "Date you expect to receive this income."),
                        fieldGroup("Amount (NZD)", refs.val, null)
                    )
                );

                node.querySelector(".item-head").append(
                    el("button", { type: "button", class: "btn btn-del", onClick: () => node.remove() }, "✕ Remove")
                );
                node.refs = refs;
                return node;
            }

            // ── Add helpers ───────────────────────────────────────────
            function addSubloan() {
                const maxNInput = toIntOrNull(document.getElementById("N").value);
                const maxN = maxNInput === null ? 20 : maxNInput;
                const list = document.getElementById("subloanList");
                if (list.children.length >= maxN) {
                    alert("Maximum " + maxN + " loan parts allowed.");
                    return;
                }
                list.append(createSubloan(subloanIdx++, list.children.length === 0));
            }

            function addSalaryChange() {
                document.getElementById("salaryChangesList").append(createSalaryChange(salaryIdx++));
            }

            function addOneOff() {
                document.getElementById("oneOffList").append(createOneOff(oneoffIdx++));
            }

            // ── Validation ────────────────────────────────────────────
            function validate() {
                const errors = [];
                const form = document.getElementById("mortgageForm");

                form.querySelectorAll(":invalid").forEach((el) => {
                    const lbl =
                        el.closest(".field")?.querySelector("label")?.textContent?.replace(/\*/g, "").trim() ||
                        el.id || "A field";
                    errors.push('"' + lbl + '" is required or has an invalid value.');
                });

                if (document.getElementById("subloanList").children.length === 0)
                    errors.push("At least one loan part is required.");

                let sumB = 0;
                document.querySelectorAll("#subloanList .list-item").forEach((item) => {
                    const principal = toNumberOrNull(item.refs.b.value);
                    if (principal !== null) sumB += principal;
                });
                if (sumB <= 0) errors.push("Total principal across all loan parts must be greater than zero.");

                const z = toNumberOrNull(document.getElementById("zeta").value);
                if (z !== null && (z <= 0 || z >= 1))
                    errors.push("Interest Decay Factor must be between 0 and 1 (exclusive).");

                const maxNInput = toIntOrNull(document.getElementById("N").value);
                const maxN = maxNInput === null ? 1 : maxNInput;
                const slCount = document.getElementById("subloanList").children.length;
                if (slCount > maxN)
                    errors.push("You have " + slCount + " loan parts but Max Loan Parts is " + maxN + ".");

                const startDate = strOrNull("startDate");
                if (!startDate) errors.push("Please choose a Prediction Start Date.");

                if (!strOrNull("d0"))
                    errors.push("Please choose a First Repayment Date.");

                document.querySelectorAll("#subloanList .list-item").forEach((item) => {
                    const r = item.refs;
                    const termLen = toIntOrNull(r.f.value);
                    const cDate = r.contractDate.value || null;
                    const lDate = r.loanStartDate.value || null;

                    const hasContractDate = isValidISODate(cDate);
                    const hasLoanDate = isValidISODate(lDate);

                    if (hasContractDate && isValidISODate(startDate) && cDate > startDate)
                        errors.push("A loan part has contract start date after the prediction start date.");

                    if (hasLoanDate && hasContractDate && lDate > cDate)
                        errors.push("A loan part has loan start date after its contract start date.");
                });
                return [...new Set(errors)];
            }

            // ── Collect form data ─────────────────────────────────────
            function collectData() {
                const num = (id) => toNumberOrNull(document.getElementById(id).value);
                const int = (id) => toIntOrNull(document.getElementById(id).value);
                const str = (id) => strOrNull(id);

                const s0Amt = num("s0");
                const s0Freq = document.getElementById("s0Freq").value;
                const betaWeekly = num("beta");
                const tauYears = num("tau");
                const tYears = num("T_years");

                const data = {
                    prediction_start_date: str("startDate"),
                    revenue: {
                        fortnightly_repayment_anchor_date: str("d0"),
                        disposable_balance_nzd: num("c0"),
                        fortnightly_disposable_income_nzd: freqToFortnightly(s0Amt, s0Freq),
                        lvr: document.getElementById("lvr").value === "true",
                        income_changes: [],
                        income_pulse: [],
                        prediction_horizon_fortnights: yearsToFortnights(tYears),
                    },
                    bank_policy: {
                        max_loan_parts: int("N"),
                        restructure_fee_nzd: num("phi"),
                        penalty_free_lumpsum_pct: num("alpha"),
                        penalty_free_payment_increase_per_fortnight_nzd: weeklyToFortnightly(betaWeekly),
                        cashback_pct: num("gamma"),
                        clawback_period_fortnights: yearsToFortnights(tauYears),
                        clawback_type: int("theta"),
                    },
                    solver_settings: {
                        emergency_shortfall_penalty: num("Omega"),
                        interest_decay_factor: num("zeta"),
                    },
                    loan_parts: [],
                };

                document.querySelectorAll("#salaryChangesList .list-item").forEach((item) => {
                    const r = item.refs;
                    const amt = toNumberOrNull(r.val.value);
                    const freq = r.freq.value;
                    data.revenue.income_changes.push({
                        effective_date: r.date.value || null,
                        new_fortnightly_income_nzd: freqToFortnightly(amt, freq),
                    });
                });

                document.querySelectorAll("#oneOffList .list-item").forEach((item) => {
                    const r = item.refs;
                    data.revenue.income_pulse.push({
                        date: r.date.value || null,
                        amount_nzd: toNumberOrNull(r.val.value),
                    });
                });

                document.querySelectorAll("#subloanList .list-item").forEach((item) => {
                    const r = item.refs;
                    const principal = toNumberOrNull(r.b.value);
                    const rawA = toNumberOrNull(r.a.value);
                    const pAmt = toNumberOrNull(r.p0.value);
                    const pFreq = r.p0Freq.value;

                    const termVal = toNumberOrNull(r.term.value);
                    const termUnit = r.termUnit.value;
                    let loanTermFortnights = null;
                    if (termVal !== null) {
                        let raw;
                        if (termUnit === "year") raw = termVal * FORTNIGHTS_PER_YEAR;
                        else if (termUnit === "month") raw = termVal * FORTNIGHTS_PER_YEAR / MONTHS_PER_YEAR;
                        else raw = termVal; // fortnight
                        // Persist as integer fortnights regardless of input unit.
                        loanTermFortnights = Math.round(raw);
                    }

                    data.loan_parts.push({
                        principal_nzd: principal,
                        loan_start_date: r.loanStartDate.value || null,
                        loan_term_fortnights: loanTermFortnights,
                        current_fortnightly_payment_nzd: freqToFortnightly(pAmt, pFreq),
                        fixed_term_product_fortnights: toIntOrNull(r.f.value),
                        contract_start_date: r.contractDate.value || null,
                        extra_repayments_this_year_nzd: toNumberOrNull(r.AL.value),
                        payment_increase_used: toIntOrNull(r.AP.value),
                        balance_at_last_anniversary_nzd: rawA === null ? principal : rawA,
                    });
                });

                return data;
            }

            function updateTotalLoan() {
                let sum = 0;
                document.querySelectorAll("#subloanList .list-item").forEach((item) => {
                    const v = toNumberOrNull(item.refs.b.value);
                    if (v !== null) sum += v;
                });
                document.getElementById("totalLoanDisplay").value = sum.toLocaleString("en-NZ", { minimumFractionDigits: 2 });
            }

            function buildExportFilename() {
                const now = new Date();
                const pad = (n) => String(n).padStart(2, "0");
                return `config-${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}-${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}.json`;
            }

            // ── Export JSON ───────────────────────────────────────────
            function exportJSON() {
                const msgEl = document.getElementById("valMsg");
                const errors = validate();
                if (errors.length) {
                    msgEl.innerHTML =
                        "<strong>Please fix the following:</strong><ul>" +
                        errors.map((e) => "<li>" + e + "</li>").join("") + "</ul>";
                    msgEl.classList.add("show");
                    msgEl.scrollIntoView({ behavior: "smooth", block: "center" });
                    return;
                }
                msgEl.classList.remove("show");

                const data = collectData();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = buildExportFilename();
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // ── Import JSON ───────────────────────────────────────────
            function importJSON(fileInput) {
                const file = fileInput.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function (e) {
                    fileInput.value = "";
                    let data;
                    try {
                        data = JSON.parse(e.target.result);
                    } catch (err) {
                        alert("Invalid JSON file: " + err.message);
                        return;
                    }
                    if (!data || typeof data !== "object") {
                        alert("Config file is empty or not a valid object.");
                        return;
                    }

                    const safeNum = (v) => (typeof v === "number" && isFinite(v) ? v : null);
                    const safeInt = (v) => { const n = safeNum(v); return n !== null && Number.isInteger(n) ? n : null; };
                    const safeDate = (v) => (isValidISODate(v) ? v : null);
                    const setVal = (id, v) => { if (v !== null && v !== undefined) document.getElementById(id).value = v; };

                    const pStart = safeDate(data.prediction_start_date);
                    if (pStart) setVal("startDate", pStart);

                    const uc = data.revenue;
                    if (uc && typeof uc === "object") {
                        const anchor = safeDate(uc.fortnightly_repayment_anchor_date);
                        if (anchor) setVal("d0", anchor);
                        if (safeNum(uc.disposable_balance_nzd) !== null) setVal("c0", safeNum(uc.disposable_balance_nzd));
                        
                        if (safeNum(uc.fortnightly_disposable_income_nzd) !== null) {
                            document.getElementById("s0Freq").value = "monthly";
                            setVal("s0", fortnightlyToMonthly(safeNum(uc.fortnightly_disposable_income_nzd)).toFixed(2));
                        }
                        
                        if (typeof uc.lvr === "boolean") setVal("lvr", String(uc.lvr));
                        
                        if (safeInt(uc.prediction_horizon_fortnights) !== null && safeInt(uc.prediction_horizon_fortnights) >= 1)
                            setVal("T_years", Math.max(1, Math.round(fortnightsToYears(safeInt(uc.prediction_horizon_fortnights)))));

                        if (Array.isArray(uc.income_changes)) {
                            document.getElementById("salaryChangesList").innerHTML = "";
                            salaryIdx = 0;
                            uc.income_changes.forEach((ic) => {
                                if (!ic || typeof ic !== "object") return;
                                const dt = safeDate(ic.effective_date);
                                const valFortnightly = safeNum(ic.new_fortnightly_income_nzd);
                                if (!dt || valFortnightly === null) return;
                                addSalaryChange();
                                const item = document.querySelector("#salaryChangesList .list-item:last-child");
                                item.refs.date.value = dt;
                                item.refs.freq.value = "monthly";
                                item.refs.val.value = fortnightlyToMonthly(valFortnightly).toFixed(2);
                            });
                        }

                        if (Array.isArray(uc.income_pulse)) {
                            document.getElementById("oneOffList").innerHTML = "";
                            oneoffIdx = 0;
                            uc.income_pulse.forEach((oo) => {
                                if (!oo || typeof oo !== "object") return;
                                const dt = safeDate(oo.date);
                                const val = safeNum(oo.amount_nzd);
                                if (!dt || val === null || val < 0) return;
                                addOneOff();
                                const item = document.querySelector("#oneOffList .list-item:last-child");
                                item.refs.date.value = dt;
                                item.refs.val.value = val;
                            });
                        }
                    }

                    const bp = data.bank_policy;
                    if (bp && typeof bp === "object") {
                        if (safeInt(bp.max_loan_parts) !== null && safeInt(bp.max_loan_parts) >= 1) setVal("N", safeInt(bp.max_loan_parts));
                        if (safeNum(bp.restructure_fee_nzd) !== null) setVal("phi", safeNum(bp.restructure_fee_nzd));
                        if (safeNum(bp.penalty_free_lumpsum_pct) !== null) { const v = safeNum(bp.penalty_free_lumpsum_pct); if (v >= 0 && v <= 100) setVal("alpha", v); }
                        if (safeNum(bp.penalty_free_payment_increase_per_fortnight_nzd) !== null)
                            setVal("beta", fortnightlyToWeekly(safeNum(bp.penalty_free_payment_increase_per_fortnight_nzd)).toFixed(2));
                        if (safeNum(bp.cashback_pct) !== null) { const v = safeNum(bp.cashback_pct); if (v >= 0 && v <= 100) setVal("gamma", v); }
                        if (safeInt(bp.clawback_period_fortnights) !== null)
                            setVal("tau", Math.round(fortnightsToYears(safeInt(bp.clawback_period_fortnights))));
                        if (safeInt(bp.clawback_type) !== null && (bp.clawback_type === 0 || bp.clawback_type === 1)) setVal("theta", safeInt(bp.clawback_type));
                    }

                    const ss = data.solver_settings;
                    if (ss && typeof ss === "object") {
                        if (safeNum(ss.emergency_shortfall_penalty) !== null) setVal("Omega", safeNum(ss.emergency_shortfall_penalty));
                        if (safeNum(ss.interest_decay_factor) !== null) { const v = safeNum(ss.interest_decay_factor); if (v > 0 && v < 1) setVal("zeta", v); }
                    }

                    if (Array.isArray(data.loan_parts) && data.loan_parts.length > 0) {
                        document.getElementById("subloanList").innerHTML = "";
                        subloanIdx = 0;
                        const maxNInput = toIntOrNull(document.getElementById("N").value);
                        const maxN = maxNInput === null ? 20 : maxNInput;
                        const allowedFixedTerms = new Set(FIXED_TERM_OPTIONS.map((o) => o.value));
                        data.loan_parts.forEach((lp, idx) => {
                            if (!lp || typeof lp !== "object") return;
                            if (idx >= maxN) return;
                            if (safeNum(lp.principal_nzd) === null || safeNum(lp.principal_nzd) < 0) return;
                            addSubloan();
                            const item = document.querySelector("#subloanList .list-item:last-child");
                            const r = item.refs;
                            r.b.value = safeNum(lp.principal_nzd);

                            const lDate = safeDate(lp.loan_start_date);
                            if (lDate) r.loanStartDate.value = lDate;

                            const ltF = safeInt(lp.loan_term_fortnights);
                            if (ltF !== null && ltF > 0) {
                                // Pick the coarsest unit that round-trips exactly, default to years.
                                if (ltF % FORTNIGHTS_PER_YEAR === 0) {
                                    r.termUnit.value = "year";
                                    r.term.value = ltF / FORTNIGHTS_PER_YEAR;
                                } else if ((ltF * MONTHS_PER_YEAR) % FORTNIGHTS_PER_YEAR === 0) {
                                    r.termUnit.value = "month";
                                    r.term.value = (ltF * MONTHS_PER_YEAR) / FORTNIGHTS_PER_YEAR;
                                } else {
                                    r.termUnit.value = "fortnight";
                                    r.term.value = ltF;
                                }
                            }

                            if (safeNum(lp.current_fortnightly_payment_nzd) !== null && safeNum(lp.current_fortnightly_payment_nzd) >= 0) {
                                r.p0Freq.value = "fortnightly";
                                r.p0.value = safeNum(lp.current_fortnightly_payment_nzd).toFixed(2);
                            }

                            const ft = safeInt(lp.fixed_term_product_fortnights);
                            if (ft !== null && allowedFixedTerms.has(ft)) {
                                r.f.value = String(ft);
                                r.f.dispatchEvent(new Event("change"));
                            } else {
                                r.f.value = "0";
                                r.f.dispatchEvent(new Event("change"));
                            }
                            const cDate = safeDate(lp.contract_start_date);
                            if (cDate) r.contractDate.value = cDate;
                            if (safeNum(lp.extra_repayments_this_year_nzd) !== null) r.AL.value = safeNum(lp.extra_repayments_this_year_nzd);
                            if (safeInt(lp.payment_increase_used) !== null && (lp.payment_increase_used === 0 || lp.payment_increase_used === 1)) r.AP.value = safeInt(lp.payment_increase_used);
                            if (safeNum(lp.balance_at_last_anniversary_nzd) !== null && safeNum(lp.balance_at_last_anniversary_nzd) >= 0 && safeNum(lp.balance_at_last_anniversary_nzd) !== safeNum(lp.principal_nzd)) r.a.value = safeNum(lp.balance_at_last_anniversary_nzd);
                        });
                        updateTotalLoan();
                    }

                    document.getElementById("valMsg").classList.remove("show");
                };
                reader.readAsText(file);
            }

            // ── Reset ─────────────────────────────────────────────────
            function resetForm() {
                if (!confirm("Reset all fields to defaults?")) return;
                document.getElementById("mortgageForm").reset();
                document.getElementById("subloanList").innerHTML = "";
                document.getElementById("salaryChangesList").innerHTML = "";
                document.getElementById("oneOffList").innerHTML = "";
                document.getElementById("valMsg").classList.remove("show");
                subloanIdx = 0;
                salaryIdx = 0;
                oneoffIdx = 0;
                addSubloan();
            }

            // ── Init ──────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                const form = document.getElementById("mortgageForm");
                form.append(
                    buildRevenueSection(),
                    buildLoanStructureSection(),
                    buildBankPolicySection(),
                    buildSolverSection(),
                    buildActions()
                );

                addSubloan();
            });
        </script>
    </body>
</html>
